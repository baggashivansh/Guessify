services:
  - type: web
    name: guessify-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      - key: GUESSIFY_DAILY_SECRET
        generateValue: true
      - key: GUESSIFY_FRONTEND_BASE_URL
        sync: false
      - key: GUESSIFY_CORS_ORIGINS
        sync: false

server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

guessify:
  frontend-base-url: ${GUESSIFY_FRONTEND_BASE_URL:https://guessify-eight.vercel.app}
  cors:
    allowed-origins: ${GUESSIFY_CORS_ORIGINS:https://guessify-eight.vercel.app,https://guessify-git-main-baggashivanshs-projects.vercel.app}
  security:
    require-origin-on-mutations: true
    daily-secret: ${GUESSIFY_DAILY_SECRET:change-me-set-GUESSIFY_DAILY_SECRET-on-render}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

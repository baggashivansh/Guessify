name: Keep API Warm

# Pings the production API so Render free tier does not spin down.
# After deploy: Settings → Secrets → add GUESSIFY_API_URL (e.g. https://guessify-api.onrender.com)

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          if [ -z "${{ secrets.GUESSIFY_API_URL }}" ]; then
            echo "GUESSIFY_API_URL secret not set — skipping ping."
            exit 0
          fi
          curl -sf --max-time 30 "${{ secrets.GUESSIFY_API_URL }}/api/health" | grep -q '"status":"UP"'
          echo "API is UP"
